<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    #globe { width: 350px; height: 350px; position: relative; }
    canvas { width: 100%; height: 100%; }
    .marker { position: absolute; width: 6px; height: 6px; background: red; border-radius: 50%; transform: translate(-50%, -50%); }
  </style>
</head>
<body>
  <div id="globe">
    <canvas id="canvas"></canvas>
    <div id="spain" class="marker"></div>
  </div>
  <script type="module">
    import createGlobe from 'https://cdn.skypack.dev/cobe';

    const canvas = document.getElementById('canvas');
    const spain = document.getElementById('spain');

    const PI = Math.PI;
    const loc = { lat: 40.4168, lon: -3.7038 };
    const phi = -2.5;

    let phiRef = phi;

    const globe = createGlobe(canvas, {
      devicePixelRatio: 2,
      width: 700,
      height: 700,
      phi: phi,
      theta: 0,
      dark: 1,
      diffuse: 1.2,
      mapSamples: 16000,
      mapBrightness: 6,
      baseColor: [1, 1, 1],
      markerColor: [0.1, 0.8, 1],
      glowColor: [0.2, 0.4, 0.8],
      opacity: 0.8,
      markers: [{ location: [40.4168, -3.7038], size: 0.1 }],
      onRender: (state) => {
        state.phi = phiRef;
        const cosPhi = Math.cos(state.phi);
        const sinPhi = Math.sin(state.phi);
        const cosTheta = 1;
        const sinTheta = 0;

        const lat = (loc.lat * PI) / 180;
        const lon = (loc.lon * PI) / 180 - PI;

        const t = Math.cos(lat);
        const pX = -t * Math.cos(lon);
        const pY = Math.sin(lat);
        const pZ = t * Math.sin(lon);

        const lX = pX * cosPhi + pZ * sinPhi;
        const lY = pX * (sinPhi * sinTheta) + pY * cosTheta + pZ * (-cosPhi * sinTheta);
        const lZ = pX * (-sinPhi * cosTheta) + pY * sinTheta + pZ * (cosPhi * cosTheta);

        const aX = 0.8 * lX;
        const aY = 0.8 * lY;

        const nX = aX;
        const nY = aY;

        const pixelX = (nX + 1) * 0.5 * 700;
        const pixelY = (nY + 1) * 0.5 * 700;

        const screenX = pixelX / 2;
        const screenY = (700 - pixelY) / 2;

        if (lZ > 0) {
          spain.style.display = 'block';
          spain.style.left = screenX + 'px';
          spain.style.top = screenY + 'px';
        } else {
          spain.style.display = 'none';
        }
      }
    });

    setInterval(() => { phiRef += 0.01; }, 16);
  </script>
</body>
</html>
